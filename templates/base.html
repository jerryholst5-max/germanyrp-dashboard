<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GermanyRP Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --text2: #999;
    --accent: #f0a500;
    --accent2: #c47d00;
    --red: #e05252;
    --green: #52c078;
    --blue: #5268e0;
    --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0.5rem; margin-bottom: 1rem; }
  .sidebar-logo img { width: 36px; height: 36px; border-radius: 50%; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: var(--accent); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.6rem 0.8rem; border-radius: 8px; color: var(--text2); font-size: 14px; text-decoration: none; transition: all 0.15s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover, .nav-item.active { background: var(--bg3); color: var(--text); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-section { font-size: 11px; color: var(--text2); padding: 0.8rem 0.8rem 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .main { flex: 1; padding: 2rem; overflow-y: auto; }
  .page-title { font-size: 22px; font-weight: 600; margin-bottom: 0.4rem; }
  .page-sub { color: var(--text2); font-size: 14px; margin-bottom: 2rem; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .card-title svg { width: 18px; height: 18px; color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 13px; color: var(--text2); }
  .form-input, .form-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.6rem 0.8rem; font-size: 14px; width: 100%; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--bg3); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-info { display: flex; flex-direction: column; gap: 3px; }
  .toggle-label { font-size: 14px; font-weight: 500; }
  .toggle-desc { font-size: 12px; color: var(--text2); }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.2s; }
  .toggle-slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(20px); }
  .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); }
  .tag { display: inline-flex; align-items: center; gap: 6px; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 13px; background: var(--bg3); border: 1px solid var(--border); }
  .tag button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
  .tag button:hover { color: var(--red); }
  .tags-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.8rem; }
  .alert { padding: 0.8rem 1rem; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; display: none; }
  .alert-success { background: rgba(82,192,120,0.15); border: 1px solid rgba(82,192,120,0.3); color: var(--green); }
  .alert-error { background: rgba(224,82,82,0.15); border: 1px solid rgba(224,82,82,0.3); color: var(--red); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(82,192,120,0.2); color: var(--green); }
  .badge-red { background: rgba(224,82,82,0.2); color: var(--red); }
  .badge-yellow { background: rgba(240,165,0,0.2); color: var(--accent); }
  .guild-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; padding: 1rem 1.25rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
  .guild-bar label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .table th { text-align: left; padding: 0.6rem 1rem; color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
  .table tr:last-child td { border-bottom: none; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 3rem 2.5rem; text-align: center; max-width: 400px; width: 100%; }
  .login-logo { font-size: 48px; margin-bottom: 1rem; }
  .login-title { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .login-sub { color: var(--text2); font-size: 14px; margin-bottom: 2rem; }
  .btn-discord { background: #5865F2; color: white; display: inline-flex; align-items: center; gap: 10px; padding: 0.8rem 1.8rem; border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
  .btn-discord:hover { opacity: 0.9; }
  .page { display: none; }
  .page.active { display: block; }
  @media (max-width: 768px) { .sidebar { display: none; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
